name: Terraform NIST Review

on:
  push:
    branches: [main]
    paths:
      - "fixtures/**"
      - "mappings/**"
      - "src/**"
      - "scripts/**"
      - ".github/workflows/iac-nist.yml"
  pull_request:
    paths:
      - "**/*.tf"
      - "fixtures/**"
      - "mappings/**"
      - "src/**"
      - "scripts/**"
      - ".github/workflows/iac-nist.yml"
  workflow_dispatch:
    inputs:
      terraform_dir:
        description: Terraform directory to scan
        required: false
        default: fixtures/terraform

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      - name: Install dependencies
        run: npm ci

      - name: Scan Terraform
        run: |
          SCAN_DIR="${{ github.event.inputs.terraform_dir || 'fixtures/terraform' }}"
          npm run scan -- "$SCAN_DIR" findings.json

      - name: Enrich with Cursor agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          SCAN_DIR="${{ github.event.inputs.terraform_dir || 'fixtures/terraform' }}"
          if [ -z "$CURSOR_API_KEY" ]; then
            npm run review -- --scan-dir "$SCAN_DIR" --scan-only
          else
            npm run review -- --scan-dir "$SCAN_DIR"
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: nist-compliance-report
          path: |
            findings.json
            report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            const body = `## Terraform NIST 800-53 Review\n\n${report.slice(0, 60000)}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
